{% extends "base.html" %}
{% block title %}Categories{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-title">Category Breakdown</div>
  <div class="page-subtitle">Where your money is going</div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
  <div class="card">
    <div class="section-title">Spending Distribution</div>
    <div style="position:relative;height:300px;"><canvas id="pieChart"></canvas></div>
  </div>
  <div class="card">
    <div class="section-title">Amount by Category</div>
    <div style="position:relative;height:300px;"><canvas id="barChart"></canvas></div>
  </div>
</div>

<div class="card">
  <div class="section-title">Detailed Breakdown</div>
  <div id="cat-table"><p style="color:var(--muted);padding:20px;">Loading...</p></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const COLORS = ['#00d4aa','#7c6df0','#f5a623','#e05260','#3b82f6','#10b981','#f59e0b','#8b5cf6','#06b6d4','#ec4899'];

fetch('/api/categories').then(r=>r.json()).then(d => {
  const labels  = d.labels  || [];
  const values  = d.values  || [];
  const total   = values.reduce((a,b)=>a+b, 0);

  // Pie chart
  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{ data: values, backgroundColor: COLORS, borderWidth: 3, borderColor: '#111318' }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: {
        legend: { position:'right', labels:{ font:{size:11}, padding:12, boxWidth:12 } },
        tooltip: { callbacks: { label: ctx => ` ₹${ctx.parsed.toLocaleString('en-IN')} — ${ctx.label}` } }
      },
      cutout: '62%'
    }
  });

  // Bar chart
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{ label:'Total Spent', data: values, backgroundColor: COLORS, borderRadius: 6 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins: { legend: { display:false } },
      scales: {
        x: { grid:{ display:false } },
        y: { grid:{ color:'#252830' }, ticks:{ callback: v => '₹'+(v/1000).toFixed(0)+'k' } }
      }
    }
  });

  // Table
  let html = `<table style="width:100%;border-collapse:collapse;">
    <thead><tr>
      <th style="text-align:left;padding:8px 12px;font-size:0.7rem;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);">Category</th>
      <th style="text-align:left;padding:8px 12px;font-size:0.7rem;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);">Total Spent</th>
      <th style="text-align:left;padding:8px 12px;font-size:0.7rem;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);">% Share</th>
    </tr></thead><tbody>`;

  labels.forEach((label, i) => {
    const pct = total > 0 ? ((values[i]/total)*100).toFixed(1) : 0;
    html += `<tr>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${COLORS[i]};margin-right:8px;"></span>${label}
      </td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;">₹${values[i].toLocaleString('en-IN')}</td>
      <td style="padding:10px 12px;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="background:var(--bg3);border-radius:99px;height:6px;width:80px;overflow:hidden;">
            <div style="height:100%;border-radius:99px;background:${COLORS[i]};width:${pct}%;"></div>
          </div>
          <span style="color:var(--muted);font-size:0.8rem;">${pct}%</span>
        </div>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('cat-table').innerHTML = html;
}).catch(e => {
  document.getElementById('cat-table').innerHTML = '<p style="color:var(--danger);padding:20px;">Error loading data.</p>';
});
</script>
{% endblock %}
