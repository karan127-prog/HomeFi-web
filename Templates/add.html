{% extends "base.html" %}
{% block title %}Add Entry{% endblock %}

{% block content %}
<div style="max-width:560px; margin:0 auto">

  {% if message %}
  <div class="alert alert-{{ message.type }}" style="margin-bottom:20px">
    {{ message.text }}
  </div>
  {% endif %}

  <div class="card">
    <div class="card-title">Add New Transaction</div>

    <form method="POST" action="/add">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-input" required
               value="{{ now if now else '' }}">
      </div>

      <div class="form-group">
        <label class="form-label">Type</label>
        <select name="type" class="form-select" required>
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="category" class="form-select" required>
          {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Amount (Rs.)</label>
        <input type="number" name="amount" class="form-input"
               placeholder="e.g. 1500" step="0.01" min="0" required>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" name="description" class="form-input"
               placeholder="e.g. Monthly groceries" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px">
        Add Transaction
      </button>
    </form>
  </div>

  <div class="card" style="margin-top:20px; background:rgba(79,195,247,0.05); border-color:rgba(79,195,247,0.15)">
    <div style="font-size:13px; color:var(--muted); line-height:1.8">
      <strong style="color:var(--accent)">Tip:</strong> After adding transactions, 
      refresh the Dashboard to see updated analysis. Your data is saved directly 
      to <span style="font-family:'JetBrains Mono',monospace; color:var(--yellow)">Data/expenses.csv</span>.
    </div>
  </div>
</div>
{% endblock %}
