{% extends "base.html" %}
{% block page_title %}Trends{% endblock %}

{% block content %}

<div class="card" style="margin-bottom:24px">
  <div class="card-title">Monthly Income vs Expense vs Savings</div>
  <div class="chart-wrap" style="height:340px">
    <canvas id="trendChart"></canvas>
  </div>
</div>

<div class="grid-2">
  <div class="card">
    <div class="card-title">Total Income (All Months)</div>
    <div class="stat-value" style="color:var(--green)" id="totalIncome">Rs.0</div>
  </div>
  <div class="card">
    <div class="card-title">Total Expense (All Months)</div>
    <div class="stat-value" style="color:var(--red)" id="totalExpense">Rs.0</div>
  </div>
</div>

<script>
fetch("/api/trends")
  .then(res => res.json())
  .then(data => {
    if (!data.months.length) {
      document.querySelector(".content").insertAdjacentHTML("afterbegin",
        '<div class="card" style="text-align:center;color:var(--muted);padding:40px 0;margin-bottom:24px">Abhi koi data nahi hai. Pehle kuch transactions add karo!</div>');
      return;
    }

    new Chart(document.getElementById("trendChart").getContext("2d"), {
      type: "line",
      data: {
        labels: data.months,
        datasets: [
          { label: "Income",  data: data.income,  borderColor: "#69f0ae", backgroundColor: "rgba(105,240,174,0.08)", tension: 0.4, fill: true, pointRadius: 5 },
          { label: "Expense", data: data.expense, borderColor: "#ff5370", backgroundColor: "rgba(255,83,112,0.08)",  tension: 0.4, fill: true, pointRadius: 5 },
          { label: "Savings", data: data.savings, borderColor: "#4fc3f7", backgroundColor: "rgba(79,195,247,0.08)",  tension: 0.4, fill: true, pointRadius: 5, borderDash: [5,3] }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: "#e8eaf6", font: { family: "Space Grotesk" } } } },
        scales: {
          x: { ticks: { color: "#7986cb" }, grid: { color: "#252540" } },
          y: { ticks: { color: "#7986cb", callback: v => "Rs." + (v/1000).toFixed(0) + "k" }, grid: { color: "#252540" } }
        }
      }
    });

    const totalIncome  = data.income.reduce((a,b) => a+b, 0);
    const totalExpense = data.expense.reduce((a,b) => a+b, 0);
    document.getElementById("totalIncome").textContent  = "Rs." + totalIncome.toLocaleString();
    document.getElementById("totalExpense").textContent = "Rs." + totalExpense.toLocaleString();
  });
</script>
{% endblock %}
