{% extends "base.html" %}
{% block page_title %}Goals{% endblock %}

{% block content %}

<div class="card" style="margin-bottom:24px">
  <div class="card-title">🎯 Yearly Goal (<span id="yearLabel"></span>)</div>
  <div id="yearlyGoals"></div>
  <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap">
    <input id="yearlyTitle" type="text" placeholder="Goal title (e.g. Emergency Fund)" class="form-input" style="flex:1; min-width:180px">
    <input id="yearlyAmount" type="number" placeholder="Target amount (Rs.)" class="form-input" style="width:160px">
    <button onclick="addGoal('yearly')" class="btn">+ Add Yearly Goal</button>
  </div>
</div>

<div class="card">
  <div class="card-title">📅 Monthly Goals (<span id="monthLabel"></span>)</div>
  <div id="monthlyGoals"></div>
  <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap">
    <input id="monthlyTitle" type="text" placeholder="Goal title (e.g. Save for laptop)" class="form-input" style="flex:1; min-width:180px">
    <input id="monthlyAmount" type="number" placeholder="Target amount (Rs.)" class="form-input" style="width:160px">
    <button onclick="addGoal('monthly')" class="btn">+ Add Monthly Goal</button>
  </div>
</div>

<script>
const now = new Date();
document.getElementById("yearLabel").textContent = now.getFullYear();
document.getElementById("monthLabel").textContent = now.toLocaleString('default', { month: 'long', year: 'numeric' });

function loadGoals() {
  fetch("/api/goals")
    .then(res => res.json())
    .then(data => {
      renderGoals("yearlyGoals", data.yearly);
      renderGoals("monthlyGoals", data.monthly);
    });
}

function renderGoals(containerId, goals) {
  const container = document.getElementById(containerId);
  if (!goals.length) {
    container.innerHTML = '<div style="color:var(--muted); padding:12px 0">Koi goal nahi set kiya hai abhi.</div>';
    return;
  }
  let html = "";
  goals.forEach(g => {
    html += `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(37,37,64,0.5)">
        <div>
          <div style="font-weight:600; color:var(--text)">${g.title}</div>
          <div style="font-size:13px; color:var(--accent); font-family:'JetBrains Mono',monospace">Rs.${Number(g.target_amount).toLocaleString()}</div>
        </div>
        <a href="javascript:void(0)" onclick="deleteGoal(${g.id})" style="color:var(--red); text-decoration:none; font-size:16px">🗑️</a>
      </div>`;
  });
  container.innerHTML = html;
}

function addGoal(type) {
  const titleEl = document.getElementById(type === 'yearly' ? 'yearlyTitle' : 'monthlyTitle');
  const amountEl = document.getElementById(type === 'yearly' ? 'yearlyAmount' : 'monthlyAmount');
  const title = titleEl.value.trim();
  const amount = amountEl.value;

  if (!title || !amount) { alert("Title aur amount dono fill karo!"); return; }

  fetch("/api/goals/add", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ goal_type: type, title: title, target_amount: amount })
  }).then(() => {
    titleEl.value = "";
    amountEl.value = "";
    loadGoals();
  });
}

function deleteGoal(id) {
  if (!confirm("Goal delete karna hai?")) return;
  fetch(`/api/goals/delete/${id}`, { method: "POST" }).then(() => loadGoals());
}

loadGoals();
</script>
{% endblock %}
