{% extends "base.html" %}
{% block page_title %}History{% endblock %}

{% block content %}

<div class="card">
  <div class="card-title">Past Months Summary</div>
  <div id="historyList"></div>
</div>

<script>
fetch("/api/history")
  .then(res => res.json())
  .then(data => {
    if (!data.months.length) {
      document.getElementById("historyList").innerHTML =
        '<div style="text-align:center;color:var(--muted);padding:40px 0">Abhi koi past month data nahi hai. Agle mahine se yahan history dikhegi!</div>';
      return;
    }

    let html = '<table class="data-table"><thead><tr><th>Month</th><th>Income</th><th>Expense</th><th>Savings</th><th>Transactions</th></tr></thead><tbody>';
    data.months.forEach(m => {
      const savingsColor = m.savings >= 0 ? "var(--green)" : "var(--red)";
      html += `
        <tr style="cursor:pointer" onclick="showMonthDetail('${m.month}')">
          <td style="font-weight:600">${m.month}</td>
          <td style="color:var(--green)">Rs.${m.income.toLocaleString()}</td>
          <td style="color:var(--red)">Rs.${m.expense.toLocaleString()}</td>
          <td style="color:${savingsColor};font-weight:600">Rs.${m.savings.toLocaleString()}</td>
          <td style="color:var(--muted)">${m.transactions}</td>
        </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById("historyList").innerHTML = html;
  });

function showMonthDetail(month) {
  fetch(`/api/history/${month}`)
    .then(res => res.json())
    .then(data => {
      let html = `<h3 style="margin:20px 0 12px;color:var(--accent)">Details for ${month}</h3>`;
      if (!data.transactions.length) {
        html += '<div style="color:var(--muted)">Koi transaction nahi mila.</div>';
      } else {
        html += '<table class="data-table"><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Type</th><th style="text-align:right">Amount</th></tr></thead><tbody>';
        data.transactions.forEach(t => {
          html += `
            <tr>
              <td style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)">${t.date}</td>
              <td><span class="badge badge-blue">${t.category}</span></td>
              <td style="color:var(--muted)">${t.description}</td>
              <td>${t.type === 'income' ? '<span class="badge badge-green">Income</span>' : '<span class="badge badge-red">Expense</span>'}</td>
              <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;color:${t.type==='income'?'var(--green)':'var(--red)'}">Rs.${t.amount.toLocaleString()}</td>
            </tr>`;
        });
        html += '</tbody></table>';
      }
      
      let detailDiv = document.getElementById("monthDetail");
      if (!detailDiv) {
        detailDiv = document.createElement("div");
        detailDiv.id = "monthDetail";
        detailDiv.className = "card";
        detailDiv.style.marginTop = "24px";
        document.querySelector(".content").appendChild(detailDiv);
      }
      detailDiv.innerHTML = html;
    });
}
</script>
{% endblock %}
