<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeFi — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo { font-size: 1.8rem; font-weight: 700; color: #6c8ef7; margin-bottom: 6px; }
    .subtitle { color: #8892a4; font-size: 0.9rem; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6c8ef7; }
    .btn {
      width: 100%;
      background: #6c8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #5a7ef5; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #8892a4; }
    .footer-link a { color: #6c8ef7; text-decoration: none; }
    .flash { background: #3d1a1a; border: 1px solid #7f1d1d; color: #fca5a5;
             padding: 10px 14px; border-radius: 8px; margin-bottom: 18px; font-size: 0.88rem; }
    .flash.success { background: #1a3d2a; border-color: #14532d; color: #86efac; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💰 HomeFi</div>
    <div class="subtitle">Track your finances, anywhere</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>

    <div class="footer-link">
      Account nahi hai? <a href="/signup">Sign Up</a>
    </div>
  </div>
</body>
</html>
