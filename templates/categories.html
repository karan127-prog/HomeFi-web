{% extends "base.html" %}
{% block page_title %}Categories{% endblock %}

{% block content %}

<div class="card" style="margin-bottom:24px">
  <div class="card-title">Spending by Category</div>
  <div class="chart-wrap" style="height:320px">
    <canvas id="catChart"></canvas>
  </div>
</div>

<div class="card">
  <div class="card-title">Category Breakdown</div>
  <div id="catList"></div>
</div>

<script>
const palette = ["#4fc3f7","#69f0ae","#ff5370","#ffd740","#b388ff","#ff8a65","#80cbc4","#f48fb1","#dce775","#81d4fa","#ce93d8"];

fetch("/api/categories")
  .then(res => res.json())
  .then(data => {
    if (!data.labels.length) {
      document.getElementById("catList").innerHTML =
        '<div style="text-align:center;color:var(--muted);padding:40px 0">Abhi koi expense data nahi hai. Pehle kuch transactions add karo!</div>';
      return;
    }

    const total = data.values.reduce((a,b) => a+b, 0);

    // Chart
    new Chart(document.getElementById("catChart").getContext("2d"), {
      type: "bar",
      data: {
        labels: data.labels,
        datasets: [{ data: data.values, backgroundColor: palette, borderRadius: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: "#7986cb" }, grid: { display: false } },
          y: { ticks: { color: "#7986cb", callback: v => "Rs." + (v/1000).toFixed(0) + "k" }, grid: { color: "#252540" } }
        }
      }
    });

    // List with progress bars
    let html = "";
    data.labels.forEach((label, i) => {
      const value = data.values[i];
      const pct = ((value/total)*100).toFixed(1);
      html += `
        <div style="margin-bottom:18px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px">
            <span style="color:var(--text);font-weight:600">${label}</span>
            <span style="color:var(--muted);font-family:'JetBrains Mono',monospace">Rs.${value.toLocaleString()} (${pct}%)</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-fill" style="width:${pct}%;background:${palette[i % palette.length]}"></div>
          </div>
        </div>`;
    });
    document.getElementById("catList").innerHTML = html;
  });
</script>
{% endblock %}
