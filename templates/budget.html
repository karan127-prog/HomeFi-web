{% extends "base.html" %}
{% block page_title %}Budget{% endblock %}

{% block content %}

<div class="card" style="margin-bottom:24px">
  <div class="card-title">💼 Set Monthly Budget (<span id="monthLabel"></span>)</div>
  <div style="display:flex; gap:10px; flex-wrap:wrap">
    <input id="newCategory" type="text" placeholder="Category (e.g. Food, Rent)" class="form-input" style="flex:1; min-width:160px">
    <input id="newAmount" type="number" placeholder="Budget amount (Rs.)" class="form-input" style="width:160px">
    <button onclick="setBudget()" class="btn">+ Set Budget</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Budget vs Actual Spending</div>
  <div id="budgetList"></div>
</div>

<script>
const now = new Date();
document.getElementById("monthLabel").textContent = now.toLocaleString('default', { month: 'long', year: 'numeric' });

function loadBudgets() {
  fetch("/api/budget-data")
    .then(res => res.json())
    .then(data => renderBudgets(data.items));
}

function renderBudgets(items) {
  const container = document.getElementById("budgetList");
  if (!items.length) {
    container.innerHTML = '<div style="color:var(--muted); padding:12px 0">Koi budget set nahi kiya hai abhi.</div>';
    return;
  }
  let html = "";
  items.forEach(item => {
    let color = "var(--green)";
    let status = "";
    if (item.budget > 0) {
      if (item.pct >= 100) { color = "var(--red)"; status = "⚠️ Exceeded"; }
      else if (item.pct >= 80) { color = "var(--yellow)"; status = "⚠️ Near limit"; }
      else { status = "✓ On track"; }
    } else {
      color = "var(--muted)";
    }
    const pct = Math.min(item.pct, 100);
    html += `
      <div style="margin-bottom:18px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px">
          <span style="color:var(--text);font-weight:600">${item.category} ${status ? `<span style="color:${color};font-size:11px;margin-left:6px">${status}</span>` : ''}</span>
          <span style="color:var(--muted);font-family:'JetBrains Mono',monospace">
            Rs.${item.spent.toLocaleString()} ${item.budget > 0 ? '/ Rs.' + item.budget.toLocaleString() : '(no budget set)'}
          </span>
        </div>
        <div class="progress-wrap">
          <div class="progress-fill" style="width:${item.budget > 0 ? pct : 0}%;background:${color}"></div>
        </div>
      </div>`;
  });
  container.innerHTML = html;
}

function setBudget() {
  const category = document.getElementById("newCategory").value.trim();
  const amount = document.getElementById("newAmount").value;
  if (!category || !amount) { alert("Category aur amount dono fill karo!"); return; }

  fetch("/api/budget/set", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ category: category, amount: amount })
  }).then(() => {
    document.getElementById("newCategory").value = "";
    document.getElementById("newAmount").value = "";
    loadBudgets();
  });
}

loadBudgets();
</script>
{% endblock %}
